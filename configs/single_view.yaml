experiment:
  condition_id: single_view
  condition_name: Single fixed view
  seed: 0

data:
  input_source: rgb_cache
  manifest_path: data/manifests/selected_regular.jsonl
  mesh_cache_root: data/mesh_cache
  splits_path: data/manifests/pose_splits_stratified_seed0.json
  render_cache_root: data/render_cache
  image_size: 224
  num_workers: 4

model:
  experiment_kind: single_view
  backbone: resnet18
  pretrained: true
  feature_dim: 512
  dropout: 0.3
  num_views: 1

rendering:
  image_size: 224
  camera_distance: 2.7
  background_color: [0.5, 0.5, 0.5]
  mesh_color: [1.0, 1.0, 1.0]

training:
  batch_size: 8
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.01
  device: auto

output:
  runs_root: outputs
