experiment:
  condition_id: mvcnn_baseline
  condition_name: MVCNN baseline
  seed: 0

data:
  dataset_root: data/dataset
  num_views: 24
  holdout_stride: 4
  image_size: 224
  num_workers: 0

model:
  backbone: resnet18
  pretrained: true
  input_channels: 1
  feature_dim: 512
  dropout: 0.3

training:
  batch_size: 4
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0
  device: auto

output:
  runs_root: outputs/runs
